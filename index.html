<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StabiX Explorer</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1 class="title">
        StabiX Explorer
    </h1>

    <div class="searchBox">

        <input
            type="text"
            id="strInput"
            placeholder="Enter STR ID">

        <button id="verifyBtn">
            VERIFY
        </button>

    </div>

    <div id="resultCard" class="resultCard">

        <div class="row">
            <span>STR ID</span>
            <span id="rStr">-</span>
        </div>

        <div class="row">
            <span>Status</span>
            <span id="rStatus">-</span>
        </div>

        <div class="row">
            <span>Type</span>
            <span id="rType">-</span>
        </div>

        <div class="row">
            <span>Mode</span>
            <span id="rMode">-</span>
        </div>

        <div class="row">
            <span>Asset</span>
            <span id="rAsset">-</span>
        </div>

        <div class="row">
            <span>Amount</span>
            <span id="rAmount">-</span>
        </div>

        <div class="row">
            <span>Network</span>
            <span id="rNetwork">-</span>
        </div>

        <div class="row">
            <span>Date</span>
            <span id="rDate">-</span>
        </div>

    </div>

</div>

<script type="module" src="js/explorer.js"></script>
    
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script>
window.onerror = function(msg, url, line, col, error) {
console.log("❌ ERROR:", msg);
console.log("📍 File:", url);
console.log("📌 Line:", line, "Column:", col);
};
</script>
    
</body>
</html>
