<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StabiX Explorer</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1 class="title">
        StabiX Explorer
    </h1>

    <p class="strHint">
  Verify transactions Through
  <span class="strLink" id="strInfo">STR ID ⓘ</span>
    </p>
    
    <div class="searchBox">

        <input
            type="text"
            id="strInput"
            placeholder="Enter STR ID">

        <button id="verifyBtn">VERIFY</button>
    </div>

        
     <br><br>
    
    <div class="liveSection">

<div id="resultCard" class="resultCard"></div>
        
  <h2>Live Transactions</h2>
  <div id="liveTxList" class="liveTxList">
    <div class="liveTxItem">
      <span>Loading...</span>
    </div>
  </div>
    </div>


    </div>

</div>

<script type="module" src="js/explorer.js"></script>
    
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script>
window.onerror = function(msg, url, line, col, error) {
console.log("❌ ERROR:", msg);
console.log("📍 File:", url);
console.log("📌 Line:", line, "Column:", col);
};
</script>
    
</body>
</html>
